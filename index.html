<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Yenni & Bill Wedding Invitation</title>
    <meta property="og:title" content="Our Wedding Day | Yenni & Bill">
    <meta property="og:description" content="We are getting married! Click to view our invitation and RSVP.">
    <meta property="og:image" content="BillWilson.jpg">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Italianno&family=Crimson+Pro:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Lato', sans-serif;
            background-color: #fff5f7;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            color: #4a4a4a;
        }

        .main-wrapper {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            overflow-x: hidden;
        }

        img.invite-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .section {
            padding: 40px 20px;
        }

        h2 {
            font-family: 'Crimson Pro', serif;
            color: #d18ba3;
            font-size: 1.9em;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            font-style: normal;
        }

        .location-container {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            text-align: center;
        }

        .location-item {
            flex: 1;
            padding: 10px;
        }

        .location-item p {
            font-size: 0.9em;
            margin-bottom: 15px;
            min-height: 80px; /* 增加高度以容納較長的酒店名稱 */
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            background-color: #ffffff;
            color: #d18ba3;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.75em;
            letter-spacing: 1px;
            border: 1px solid #d18ba3;
            text-transform: uppercase;
            transition: 0.3s;
            width: 80%;
        }
        .btn:hover {
            background-color: #d18ba3;
            color: #ffffff;
        }

        /* 🎬 膠卷輪播 🎬 */
        .film-container {
            width: 100%;
            background: #ffffff;
            padding: 30px 0;
            position: relative;
            margin: 20px 0;
            border-top: 1px solid #fce4ec;
            border-bottom: 1px solid #fce4ec;
        }

        .film-track {
            display: flex;
            width: max-content;
            animation: slideLeft 40s linear infinite;
        }

        @keyframes slideLeft {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .film-frame {
            flex: 0 0 auto;
            width: 260px;
            height: 360px;
            margin: 0 10px;
            border-radius: 8px;
            overflow: hidden;
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        }

        .film-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rsvp-section {
            background-color: #fff9fa;
            padding: 60px 20px;
            border-top: 1px solid #fce4ec;
        }

        .rsvp-text {
            margin-bottom: 25px;
            line-height: 1.6;
            color: #666;
            font-size: 1.05em;
        }

        .rsvp-btn {
            background-color: #d18ba3;
            color: #ffffff;
            padding: 18px 70px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.5em;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(209,139,163,0.3);
            letter-spacing: 3px;
            transition: 0.3s;
        }

        .footer {
            padding: 50px 20px;
            font-family: 'Italianno', cursive;
            font-size: 2.8em;
            color: #d18ba3;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <img src="BillWilson.jpg" alt="Invitation Cover" class="invite-img">

        <img src="BillWilson1.jpg" alt="Wedding Details" class="invite-img">

        <div class="section">
            <h2>Directions</h2>
            
            <div class="location-container">
                <div class="location-item">
                    <p><strong>Celebration   2 PM</strong><br>New Life Church Tondo</p>
                    <a href="https://www.google.com/maps/search/?api=1&query=New+Life+Tondo" target="_blank" class="btn">Open Maps</a>
                </div>

                <div class="location-item">
                    <p><strong>Reception   6 PM</strong><br>The Heritage Hotel Manila ( Ballroom )</p>
                    <a href="https://www.google.com/maps/search/?api=1&query=The+Heritage+Hotel+Manila" target="_blank" class="btn">Open Maps</a>
                </div>
            </div>
        </div>

        <div class="film-container">
            <div class="film-track">
                <div class="film-frame"><img src="yenni1.jpg"></div>
                <div class="film-frame"><img src="yenni2.jpg"></div>
                <div class="film-frame"><img src="yenni3.jpg"></div>
                <div class="film-frame"><img src="yenni4.jpg"></div>
                <div class="film-frame"><img src="yenni5.jpg"></div>
                <div class="film-frame"><img src="yenni6.jpg"></div>
                <div class="film-frame"><img src="yenni12.jpg"></div>
                <div class="film-frame"><img src="yenni7.jpg"></div>
                <div class="film-frame"><img src="yenni8.jpg"></div>
                <div class="film-frame"><img src="yenni9.jpg"></div>
                <div class="film-frame"><img src="yenni10.jpg"></div>
                
                <div class="film-frame"><img src="yenni1.jpg"></div>
                <div class="film-frame"><img src="yenni2.jpg"></div>
                <div class="film-frame"><img src="yenni3.jpg"></div>
                <div class="film-frame"><img src="yenni4.jpg"></div>
                <div class="film-frame"><img src="yenni5.jpg"></div>
                <div class="film-frame"><img src="yenni6.jpg"></div>
                <div class="film-frame"><img src="yenni12.jpg"></div>
                <div class="film-frame"><img src="yenni7.jpg"></div>
                <div class="film-frame"><img src="yenni8.jpg"></div>
                <div class="film-frame"><img src="yenni9.jpg"></div>
                <div class="film-frame"><img src="yenni10.jpg"></div>
            </div>
        </div>

        <div class="rsvp-section">
            <div class="rsvp-text">
                Please kindly respond by clicking the button below.<br>
                We look forward to seeing you!
            </div>
            <a href="https://forms.gle/vtsvyGpvdMXDehzh9" target="_blank" class="rsvp-btn">RSVP</a>
        </div>

        <div class="footer">
            <p>With Love, Yenni &  Bill</p>
        </div>
    </div>

</body>
</html>
